<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Release Planner</title>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #acb3cf; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ---------------------------------------------------------
   ICONS — minimal inline SVGs (standalone build has no
   lucide-react dependency, keeping this a single file)
--------------------------------------------------------- */
function Icon({ children, size = 16, strokeWidth = 2 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth={strokeWidth}
         strokeLinecap="round" strokeLinejoin="round">
      {children}
    </svg>
  );
}
function Plus(props) { return <Icon {...props}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></Icon>; }
function ChevronLeft(props) { return <Icon {...props}><polyline points="15 18 9 12 15 6" /></Icon>; }
function Trash2(props) { return <Icon {...props}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></Icon>; }
function X(props) { return <Icon {...props}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></Icon>; }
function LinkIcon(props) { return <Icon {...props}><path d="M10 13a5 5 0 0 0 7.07 0l1.93-1.93a5 5 0 0 0-7.07-7.07L10.5 5.5" /><path d="M14 11a5 5 0 0 0-7.07 0L4.99 12.93a5 5 0 0 0 7.07 7.07L13.5 18.5" /></Icon>; }


/* ---------------------------------------------------------
   CONSTANTS — derived from the source planning template
--------------------------------------------------------- */

const TEAMS = [
  "None", "Unassigned", "Architecture", "BI/Reporting", "Internal Development",
  "Clinical", "Finance", "Integration", "Insurance", "Patient", "Slams", "Curve Capture",
];

const PROJECT_STATUSES = [
  "Unreleased", "Paused", "In Beta", "Closing", "Released", "Limited Release", "GA Rollout",
];

const SIZES = ["S", "M", "L", "XL", "XXL"];

const TASK_STATUSES = ["Not started", "In Progress", "In Review", "N/A", "Done"];

const TASK_STATUS_STYLE = {
  "Not started": { fg: "var(--ink-faint)", bg: "transparent", border: "var(--hairline)" },
  "In Progress": { fg: "var(--brass)", bg: "var(--brass-10)", border: "var(--brass)" },
  "In Review": { fg: "var(--ink)", bg: "var(--sand)", border: "var(--ink-faint)" },
  "N/A": { fg: "var(--ink-faint)", bg: "transparent", border: "var(--hairline)" },
  "Done": { fg: "var(--teal)", bg: "var(--teal-10)", border: "var(--teal)" },
};

const PHASES = ["Charter", "Beta", "GA", "Close"];

const DEFAULT_CHECKLIST = {

    ["Address what problem we are solving", ""],
    ["Initiate the Project Charter", "PR702A"],
    ["Initiate Project Journal", ""],
    ["Prepare Risk Assessment", "QR707A — document can be started early, but review periodically through the project"],
    ["Create Work Breakdown Structure (WBS) for project", ""],
    ["Project Kick Off-", ""],
  ],
  Beta: [
    ["Prepare the Beta Release Document", "PR707D — itself a checklist; prepare early so release cards are set up properly"],
    ["Prepare Release Notes", "Start to paint the picture of what we are building"],
    ["Prepare Beta Validation Record — Design and Requirements", "PR707A"],
    ["Prepare Beta Validation Record — Beta Validation", "PR707A"],
    ["Validation NDA required?", "PR707B"],
    ["Beta customer list preparation", "Validate with stakeholders"],
    ["Sales and Training instances enabled into Beta?", ""],
    ["Create in-product feedback link cards (if necessary)", ""],
    ["Create Beta label cards (if necessary)", ""],
    ["Create Community cards", ""],
    ["Product Manager review", "As per PR707D"],
    ["Live session with CS team", "Include the technical writer, training script writer, and support management team"],
    ["Staged Beta rollout?", "Determine if a staged rollout plan is needed"],
    ["Pre-Beta release customer communication", "Work with Marketing to distribute via email"],
    ["Beta enabled communication", "Pendo messaging"],
    ["Approval of Beta release", ""],
  ],
  GA: [
    ["Update Project Status Chart", ""],
    ["Prepare the Approval of Release Document", "PR708A — enter all relevant fields prior to approval"],
    ["Update Release Notes", ""],
    ["Update Validation Activity Records", ""],
    ["Remove in-product feedback links from Beta (if necessary)", ""],
    ["Remove Beta labels (if necessary)", ""],
    ["Staged GA rollout?", "Determine if a staged rollout plan is needed"],
    ["Complete the Approval of Release Document", ""],
    ["Pre-GA release customer communication", "Work with Marketing to distribute via email"],
    ["GA enabled communication", "Pendo messaging"],
    ["Approval of GA release", ""],
    ["Internal employee communication", "Let the team share in the win"],
    ["Update Release Calendar", ""],
    ["Release [GA] FixVersion in Jira", ""],
  ],
  Close: [
    ["Wrap up cards", ""],
    ["Release [CLOSE] FixVersion in Jira", ""],
    ["Project retrospective", ""],
  ],
};

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

function freshChecklist() {
  const out = {};
  PHASES.forEach((phase) => {
    out[phase] = DEFAULT_CHECKLIST[phase].map(([task, description]) => ({
      id: uid(), task, description, status: "Not started", link: "", note: "",
    }));
  });
  return out;
}

function freshProject(name) {
  return {
    id: uid(),
    name: name || "Untitled project",
    team: "Unassigned",
    status: "Unreleased",
    size: "M",
    priority: 3,
    createdAt: Date.now(),
    updatedAt: Date.now(),
    poster: {
      winningDeliverable: "", problemStatement: "", strategyFit: "", themeTie: "",
      whyImportant: "", whyNow: "", successMetrics: "", constraints: "",
      whatWeKnow: "", whatWeNeedToAnswer: "",
    },
    fiveWhys: { problem: "", whys: ["", "", "", "", ""], rootCause: "", opportunity: "" },
    jtbd: [],
    northStar: "",
    checklist: freshChecklist(),
  };
}

/* ---------------------------------------------------------
   STORAGE
--------------------------------------------------------- */

const STORAGE_KEY = "release-planner:projects";

async function loadProjects() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
    return null;
  } catch (e) {
    return null;
  }
}

async function saveProjects(projects) {
  try {
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
  } catch (e) {
    console.error("Save failed", e);
  }
}

/* ---------------------------------------------------------
   DERIVED HELPERS
--------------------------------------------------------- */

function phaseProgress(items) {
  if (!items || items.length === 0) return 1;
  const done = items.filter((i) => i.status === "Done" || i.status === "N/A").length;
  return done / items.length;
}

function overallProgress(project) {
  const all = PHASES.flatMap((p) => project.checklist[p]);
  if (all.length === 0) return 0;
  const done = all.filter((i) => i.status === "Done" || i.status === "N/A").length;
  return done / all.length;
}

function activePhase(project) {
  for (const p of PHASES) {
    if (phaseProgress(project.checklist[p]) < 1) return p;
  }
  return "Close";
}

function relativeTime(ts) {
  const diff = Date.now() - ts;
  const day = 86400000;
  if (diff < 3600000) return "just now";
  if (diff < day) return Math.floor(diff / 3600000) + "h ago";
  if (diff < day * 30) return Math.floor(diff / day) + "d ago";
  return new Date(ts).toLocaleDateString();
}

/* ---------------------------------------------------------
   SHARED UI ATOMS
--------------------------------------------------------- */

function GateTrack({ project, size = "normal" }) {
  const active = activePhase(project);
  return (
    <div className={`gate-track gate-track--${size}`}>
      {PHASES.map((phase) => {
        const pct = phaseProgress(project.checklist[phase]) * 100;
        const isActive = phase === active && pct < 100;
        return (
          <div className="gate-seg" key={phase}>
            <div className="gate-seg__label">{phase}</div>
            <div className="gate-seg__bar">
              <div
                className="gate-seg__fill"
                style={{ width: pct + "%" }}
                data-complete={pct >= 100}
              />
            </div>
            {isActive && <div className="gate-seg__dot" />}
          </div>
        );
      })}
    </div>
  );
}

function PriorityDots({ value, onChange }) {
  return (
    <div className="priority-dots" onClick={(e) => e.stopPropagation()}>
      {[1, 2, 3, 4, 5].map((n) => (
        <button
          key={n}
          type="button"
          className="priority-dot"
          data-filled={n <= value}
          onClick={() => onChange && onChange(n)}
          aria-label={"priority " + n}
        />
      ))}
    </div>
  );
}

function Field({ label, hint, children }) {
  return (
    <div className="field">
      <div className="field__label">{label}</div>
      {hint && <div className="field__hint">{hint}</div>}
      {children}
    </div>
  );
}

function TextArea(props) {
  return <textarea className="ta" rows={3} {...props} />;
}

function Select({ value, onChange, options }) {
  return (
    <select className="sel" value={value} onChange={(e) => onChange(e.target.value)}>
      {options.map((o) => (
        <option key={o} value={o}>{o}</option>
      ))}
    </select>
  );
}

/* ---------------------------------------------------------
   DASHBOARD
--------------------------------------------------------- */

function Dashboard({ projects, onOpen, onCreate, onDelete }) {
  const [draftName, setDraftName] = useState("");
  const [creating, setCreating] = useState(false);

  return (
    <div className="dash">
      <header className="dash__header">
        <div>
          <div className="eyebrow">Release Planner</div>
          <h1 className="dash__title">Project bench</h1>
          <p className="dash__sub">
            Charter, validate, and ship. Every project moves through the same four gates.
          </p>
        </div>
        <button className="btn btn--primary" onClick={() => setCreating(true)}>
          <Plus size={16} strokeWidth={2.5} /> New project
        </button>
      </header>

      {creating && (
        <form
          className="new-project-row"
          onSubmit={(e) => {
            e.preventDefault();
            if (!draftName.trim()) return;
            onCreate(draftName.trim());
            setDraftName("");
            setCreating(false);
          }}
        >
          <input
            autoFocus
            className="new-project-row__input"
            placeholder="Name this project…"
            value={draftName}
            onChange={(e) => setDraftName(e.target.value)}
          />
          <button className="btn btn--primary" type="submit">Add</button>
          <button className="btn" type="button" onClick={() => { setCreating(false); setDraftName(""); }}>
            Cancel
          </button>
        </form>
      )}

      {projects.length === 0 && !creating && (
        <div className="empty">
          <div className="empty__title">No projects on the bench yet.</div>
          <div className="empty__body">
            Start one to lay out the customer problem, the jobs it does for them, and the
            checklist that carries it from Charter to GA.
          </div>
          <button className="btn btn--primary" onClick={() => setCreating(true)}>
            <Plus size={16} strokeWidth={2.5} /> Start first project
          </button>
        </div>
      )}

      <div className="card-grid">
        {projects.map((p) => (
          <div className="pcard" key={p.id} onClick={() => onOpen(p.id)} tabIndex={0}
               onKeyDown={(e) => { if (e.key === "Enter") onOpen(p.id); }}>
            <button
              className="pcard__delete"
              title="Delete project"
              onClick={(e) => { e.stopPropagation(); onDelete(p.id); }}
            >
              <Trash2 size={14} />
            </button>
            <div className="pcard__top">
              <div className="pcard__name">{p.name}</div>
              <div className="pcard__meta">
                <span className="chip">{p.team}</span>
                <span className="chip chip--mono">{p.size}</span>
              </div>
            </div>
            <div className="pcard__status">
              <span className="status-pill">{p.status}</span>
              <PriorityDots value={p.priority} />
            </div>
            <GateTrack project={p} size="compact" />
            <div className="pcard__foot">
              <span>{Math.round(overallProgress(p) * 100)}% complete</span>
              <span>{relativeTime(p.updatedAt)}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   PROJECT DETAIL — TABS
--------------------------------------------------------- */

const TABS = ["Poster", "Discovery", "North Star", "Checklist"];

function ProjectDetail({ project, onChange, onBack }) {
  const [tab, setTab] = useState("Poster");

  const update = (patch) => {
    onChange({ ...project, ...patch, updatedAt: Date.now() });
  };
  const updatePoster = (key, value) => {
    update({ poster: { ...project.poster, [key]: value } });
  };

  return (
    <div className="detail">
      <div className="detail__rail">
        <button className="btn btn--ghost" onClick={onBack}>
          <ChevronLeft size={16} /> All projects
        </button>

        <input
          className="detail__name"
          value={project.name}
          onChange={(e) => update({ name: e.target.value })}
        />

        <div className="rail-row">
          <label className="rail-label">Team</label>
          <Select value={project.team} onChange={(v) => update({ team: v })} options={TEAMS} />
        </div>
        <div className="rail-row">
          <label className="rail-label">Status</label>
          <Select value={project.status} onChange={(v) => update({ status: v })} options={PROJECT_STATUSES} />
        </div>
        <div className="rail-row">
          <label className="rail-label">Size</label>
          <Select value={project.size} onChange={(v) => update({ size: v })} options={SIZES} />
        </div>
        <div className="rail-row">
          <label className="rail-label">Priority</label>
          <PriorityDots value={project.priority} onChange={(v) => update({ priority: v })} />
        </div>

        <div className="rail-gate">
          <div className="rail-label">Gate progress</div>
          <GateTrack project={project} size="rail" />
        </div>
      </div>

      <div className="detail__main">
        <div className="tabbar">
          {TABS.map((t) => (
            <button
              key={t}
              className="tabbar__item"
              data-active={t === tab}
              onClick={() => setTab(t)}
            >
              {t}
            </button>
          ))}
        </div>

        {tab === "Poster" && <PosterTab poster={project.poster} onChange={updatePoster} />}
        {tab === "Discovery" && (
          <DiscoveryTab
            fiveWhys={project.fiveWhys}
            jtbd={project.jtbd}
            onFiveWhys={(fw) => update({ fiveWhys: fw })}
            onJtbd={(j) => update({ jtbd: j })}
          />
        )}
        {tab === "North Star" && (
          <NorthStarTab value={project.northStar} onChange={(v) => update({ northStar: v })} />
        )}
        {tab === "Checklist" && (
          <ChecklistTab checklist={project.checklist} onChange={(c) => update({ checklist: c })} />
        )}
      </div>
    </div>
  );
}

function PosterTab({ poster, onChange }) {
  const rows = [
    ["winningDeliverable", "What a winning deliverable looks like to a customer", "The elevator pitch. This is the project vision."],
    ["problemStatement", "What problem are we solving?", ""],
    ["strategyFit", "How does this project fit with our strategy?", "Tie the project to a broader theme."],
    ["themeTie", "Does this project tie to a theme?", ""],
    ["whyImportant", "Why are we doing this?", "Impact on customers and business. What's the unfair advantage?"],
    ["whyNow", "Why are we doing this now?", ""],
    ["successMetrics", "What are our metrics of success?", "Needs to be specific and measurable before moving into build."],
    ["constraints", "What are the project constraints?", "What won't this feature do?"],
    ["whatWeKnow", "What do we already know?", "Data or insight that validates this."],
    ["whatWeNeedToAnswer", "What do we need to answer?", "Assumptions that need validating. Gaps in understanding."],
  ];
  return (
    <div className="panel poster-grid">
      {rows.map(([key, label, hint]) => (
        <Field key={key} label={label} hint={hint}>
          <TextArea value={poster[key]} onChange={(e) => onChange(key, e.target.value)} />
        </Field>
      ))}
    </div>
  );
}

function DiscoveryTab({ fiveWhys, jtbd, onFiveWhys, onJtbd }) {
  const setWhy = (i, val) => {
    const whys = [...fiveWhys.whys];
    whys[i] = val;
    onFiveWhys({ ...fiveWhys, whys });
  };

  const addJtbd = () => {
    onJtbd([...jtbd, { id: uid(), situation: "", motivation: "", outcome: "", emotionalJob: "", socialJob: "" }]);
  };
  const updateJtbd = (id, key, val) => {
    onJtbd(jtbd.map((j) => (j.id === id ? { ...j, [key]: val } : j)));
  };
  const removeJtbd = (id) => onJtbd(jtbd.filter((j) => j.id !== id));

  return (
    <div className="panel">
      <section className="subsection">
        <div className="subsection__title">The 5 Whys</div>
        <div className="subsection__hint">
          What motivates the customer to use the product. Drill past the surface answer to the
          emotional core of the problem.
        </div>
        <Field label="Initial question">
          <TextArea
            rows={2}
            placeholder="e.g. Why do you drink coffee in the morning?"
            value={fiveWhys.problem}
            onChange={(e) => onFiveWhys({ ...fiveWhys, problem: e.target.value })}
          />
        </Field>
        <div className="whys-chain">
          {fiveWhys.whys.map((w, i) => (
            <div className="whys-chain__row" key={i}>
              <div className="whys-chain__index">{i + 1}</div>
              <TextArea rows={1} placeholder="Why?" value={w} onChange={(e) => setWhy(i, e.target.value)} />
            </div>
          ))}
        </div>
        <div className="two-col">
          <Field label="Root cause">
            <TextArea value={fiveWhys.rootCause} onChange={(e) => onFiveWhys({ ...fiveWhys, rootCause: e.target.value })} />
          </Field>
          <Field label="Opportunity" hint="How can the experience be enhanced?">
            <TextArea value={fiveWhys.opportunity} onChange={(e) => onFiveWhys({ ...fiveWhys, opportunity: e.target.value })} />
          </Field>
        </div>
      </section>

      <section className="subsection">
        <div className="subsection__title">Jobs to be done</div>
        <div className="subsection__hint">
          As a customer, when I want to, so I can, making me feel, and making others see I'm.
        </div>
        {jtbd.map((j) => (
          <div className="jtbd-row" key={j.id}>
            <button className="jtbd-row__remove" onClick={() => removeJtbd(j.id)}><X size={14} /></button>
            <div className="jtbd-grid">
              <Field label="When…"><TextArea rows={2} value={j.situation} onChange={(e) => updateJtbd(j.id, "situation", e.target.value)} /></Field>
              <Field label="I want to…"><TextArea rows={2} value={j.motivation} onChange={(e) => updateJtbd(j.id, "motivation", e.target.value)} /></Field>
              <Field label="So I can…"><TextArea rows={2} value={j.outcome} onChange={(e) => updateJtbd(j.id, "outcome", e.target.value)} /></Field>
              <Field label="Making me feel…"><TextArea rows={2} value={j.emotionalJob} onChange={(e) => updateJtbd(j.id, "emotionalJob", e.target.value)} /></Field>
              <Field label="Others see I'm…"><TextArea rows={2} value={j.socialJob} onChange={(e) => updateJtbd(j.id, "socialJob", e.target.value)} /></Field>
            </div>
          </div>
        ))}
        <button className="btn" onClick={addJtbd}><Plus size={14} /> Add job to be done</button>
      </section>
    </div>
  );
}

function NorthStarTab({ value, onChange }) {
  return (
    <div className="panel">
      <section className="subsection">
        <div className="subsection__title">Definition of success / North Star</div>
        <div className="subsection__hint">
          What does success look like from the customer's perspective, and what can be measured
          to define it? This is a north star, reminding the team what to achieve without
          prescribing how.
        </div>
        <TextArea rows={8} value={value} onChange={(e) => onChange(e.target.value)} />
      </section>
    </div>
  );
}

function ChecklistTab({ checklist, onChange }) {
  const updateItem = (phase, id, patch) => {
    onChange({
      ...checklist,
      [phase]: checklist[phase].map((it) => (it.id === id ? { ...it, ...patch } : it)),
    });
  };
  const addItem = (phase) => {
    onChange({
      ...checklist,
      [phase]: [...checklist[phase], { id: uid(), task: "New task", description: "", status: "Not started", link: "", note: "" }],
    });
  };
  const removeItem = (phase, id) => {
    onChange({ ...checklist, [phase]: checklist[phase].filter((it) => it.id !== id) });
  };

  return (
    <div className="panel">
      {PHASES.map((phase) => {
        const pct = Math.round(phaseProgress(checklist[phase]) * 100);
        return (
          <section className="phase-block" key={phase}>
            <div className="phase-block__head">
              <div className="phase-block__name">{phase}</div>
              <div className="phase-block__pct">{pct}%</div>
            </div>
            <div className="task-list">
              {checklist[phase].map((item) => {
                const style = TASK_STATUS_STYLE[item.status];
                return (
                  <div className="task-row" key={item.id}>
                    <input
                      className="task-row__task"
                      value={item.task}
                      onChange={(e) => updateItem(phase, item.id, { task: e.target.value })}
                    />
                    <select
                      className="task-row__status"
                      value={item.status}
                      style={{ color: style.fg, background: style.bg, borderColor: style.border }}
                      onChange={(e) => updateItem(phase, item.id, { status: e.target.value })}
                    >
                      {TASK_STATUSES.map((s) => <option key={s} value={s}>{s}</option>)}
                    </select>
                    <div className="task-row__link">
                      <LinkIcon size={12} />
                      <input
                        placeholder="link"
                        value={item.link}
                        onChange={(e) => updateItem(phase, item.id, { link: e.target.value })}
                      />
                    </div>
                    <input
                      className="task-row__note"
                      placeholder="note"
                      value={item.note}
                      onChange={(e) => updateItem(phase, item.id, { note: e.target.value })}
                    />
                    <button className="task-row__remove" onClick={() => removeItem(phase, item.id)}>
                      <X size={13} />
                    </button>
                    {item.description && <div className="task-row__desc">{item.description}</div>}
                  </div>
                );
              })}
            </div>
            <button className="btn btn--small" onClick={() => addItem(phase)}>
              <Plus size={13} /> Add task
            </button>
          </section>
        );
      })}
    </div>
  );
}

/* ---------------------------------------------------------
   ROOT
--------------------------------------------------------- */

function App() {
  const [projects, setProjects] = useState([]);
  const [openId, setOpenId] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [status, setStatus] = useState("");
  const saveTimer = useRef(null);

  useEffect(() => {
    (async () => {
      const data = await loadProjects();
      if (data) setProjects(data);
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setStatus("Saving…");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      await saveProjects(projects);
      setStatus("Saved");
      setTimeout(() => setStatus(""), 1200);
    }, 500);
    return () => clearTimeout(saveTimer.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [projects, loaded]);

  const createProject = (name) => {
    const p = freshProject(name);
    setProjects((prev) => [p, ...prev]);
    setOpenId(p.id);
  };
  const deleteProject = (id) => {
    setProjects((prev) => prev.filter((p) => p.id !== id));
    if (openId === id) setOpenId(null);
  };
  const updateProject = (updated) => {
    setProjects((prev) => prev.map((p) => (p.id === updated.id ? updated : p)));
  };

  const openProject = projects.find((p) => p.id === openId);

  return (
    <div className="app">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

        :root {
          --canvas: #EEF2F0;
          --surface: #F8FAF9;
          --ink: #17262B;
          --ink-faint: #6B7B78;
          --hairline: #CDD6D1;
          --teal: #2F7A63;
          --teal-10: rgba(47,122,99,0.12);
          --brass: #B8863A;
          --brass-10: rgba(184,134,58,0.14);
          --brick: #A6432F;
          --sand: #EFE9DC;
        }
        * { box-sizing: border-box; }
        .app {
          background: var(--canvas);
          color: var(--ink);
          font-family: 'IBM Plex Sans', system-ui, sans-serif;
          min-height: 100%;
          padding: 32px clamp(16px, 4vw, 56px) 64px;
        }
        .app :focus-visible {
          outline: 2px solid var(--teal);
          outline-offset: 2px;
        }
        h1, h2, .eyebrow { font-family: 'Space Grotesk', sans-serif; }
        .eyebrow {
          font-family: 'IBM Plex Mono', monospace;
          font-size: 11px;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: var(--teal);
          margin-bottom: 6px;
        }

        /* ---------- dashboard ---------- */
        .dash__header {
          display: flex;
          align-items: flex-end;
          justify-content: space-between;
          gap: 24px;
          border-bottom: 1px solid var(--hairline);
          padding-bottom: 24px;
          margin-bottom: 28px;
          flex-wrap: wrap;
        }
        .dash__title { font-size: clamp(28px, 4vw, 40px); font-weight: 600; margin: 0 0 6px; }
        .dash__sub { color: var(--ink-faint); margin: 0; max-width: 46ch; font-size: 14px; }

        .btn {
          display: inline-flex; align-items: center; gap: 6px;
          font-family: 'IBM Plex Sans', sans-serif;
          font-size: 13px; font-weight: 500;
          padding: 9px 14px; border-radius: 8px;
          border: 1px solid var(--hairline);
          background: var(--surface); color: var(--ink);
          cursor: pointer; white-space: nowrap;
          transition: border-color .15s ease, transform .1s ease;
        }
        .btn:hover { border-color: var(--ink-faint); }
        .btn:active { transform: translateY(1px); }
        .btn--primary { background: var(--ink); color: var(--surface); border-color: var(--ink); }
        .btn--primary:hover { background: #223A34; border-color: #223A34; }
        .btn--ghost { background: transparent; border-color: transparent; padding-left: 4px; color: var(--ink-faint); }
        .btn--ghost:hover { color: var(--ink); }
        .btn--small { font-size: 12px; padding: 6px 10px; }

        .new-project-row {
          display: flex; gap: 8px; margin-bottom: 24px;
        }
        .new-project-row__input {
          flex: 1; max-width: 420px;
          padding: 9px 12px; border-radius: 8px;
          border: 1px solid var(--hairline); background: var(--surface);
          font-family: inherit; font-size: 14px; color: var(--ink);
        }

        .empty {
          border: 1px dashed var(--hairline); border-radius: 12px;
          padding: 40px 32px; text-align: left; max-width: 480px;
          margin-bottom: 32px;
        }
        .empty__title { font-weight: 600; margin-bottom: 8px; }
        .empty__body { color: var(--ink-faint); font-size: 14px; margin-bottom: 18px; max-width: 42ch; }

        .card-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
          gap: 16px;
        }
        .pcard {
          position: relative;
          background: var(--surface);
          border: 1px solid var(--hairline);
          border-radius: 12px;
          padding: 18px 18px 16px;
          cursor: pointer;
          transition: border-color .15s ease, box-shadow .15s ease;
        }
        .pcard:hover, .pcard:focus-visible { border-color: var(--teal); box-shadow: 0 2px 14px rgba(23,38,43,0.06); }
        .pcard__delete {
          position: absolute; top: 12px; right: 12px;
          background: transparent; border: none; color: var(--ink-faint);
          cursor: pointer; opacity: 0; transition: opacity .12s ease;
          padding: 4px;
        }
        .pcard:hover .pcard__delete { opacity: 1; }
        .pcard__delete:hover { color: var(--brick); }
        .pcard__top { margin-bottom: 10px; padding-right: 20px; }
        .pcard__name { font-weight: 600; font-size: 16px; margin-bottom: 8px; }
        .pcard__meta { display: flex; gap: 6px; flex-wrap: wrap; }
        .pcard__status { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .pcard__foot {
          display: flex; justify-content: space-between;
          font-family: 'IBM Plex Mono', monospace;
          font-size: 11px; color: var(--ink-faint); margin-top: 10px;
        }

        .chip {
          font-size: 11px; font-family: 'IBM Plex Mono', monospace;
          padding: 3px 8px; border-radius: 100px;
          background: var(--canvas); color: var(--ink-faint);
          border: 1px solid var(--hairline);
        }
        .chip--mono { font-weight: 500; }
        .status-pill {
          font-size: 11px; font-weight: 500;
          padding: 4px 10px; border-radius: 100px;
          background: var(--teal-10); color: var(--teal);
        }

        .priority-dots { display: flex; gap: 3px; }
        .priority-dot {
          width: 7px; height: 7px; border-radius: 50%;
          border: 1px solid var(--ink-faint); background: transparent;
          padding: 0; cursor: pointer;
        }
        .priority-dot[data-filled="true"] { background: var(--brass); border-color: var(--brass); }

        /* ---------- gate track (signature element) ---------- */
        .gate-track { display: flex; gap: 6px; }
        .gate-seg { flex: 1; position: relative; }
        .gate-seg__label {
          font-family: 'IBM Plex Mono', monospace;
          font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
          color: var(--ink-faint); margin-bottom: 4px;
        }
        .gate-track--compact .gate-seg__label { display: none; }
        .gate-seg__bar {
          height: 6px; border-radius: 3px; background: var(--hairline); overflow: hidden;
          position: relative;
        }
        .gate-track--rail .gate-seg__bar { height: 8px; }
        .gate-seg__fill {
          height: 100%; background: var(--brass);
          transition: width .3s ease;
        }
        .gate-seg__fill[data-complete="true"] { background: var(--teal); }
        .gate-seg__dot {
          position: absolute; right: -2px; top: -2px;
          width: 10px; height: 10px; border-radius: 50%;
          background: var(--brass); box-shadow: 0 0 0 3px var(--brass-10);
        }
        .gate-track--rail { flex-direction: column; gap: 12px; }
        .gate-track--rail .gate-seg__label { display: block; margin-bottom: 5px; }

        /* ---------- detail layout ---------- */
        .detail { display: grid; grid-template-columns: 240px 1fr; gap: 32px; align-items: start; }
        @media (max-width: 800px) { .detail { grid-template-columns: 1fr; } }

        .detail__rail {
          position: sticky; top: 24px;
          background: var(--surface); border: 1px solid var(--hairline);
          border-radius: 12px; padding: 18px;
          display: flex; flex-direction: column; gap: 14px;
        }
        .detail__name {
          font-family: 'Space Grotesk', sans-serif;
          font-size: 20px; font-weight: 600; color: var(--ink);
          border: none; background: transparent; padding: 0;
          border-bottom: 1px solid transparent;
        }
        .detail__name:hover, .detail__name:focus { border-bottom-color: var(--hairline); }
        .rail-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .rail-label {
          font-family: 'IBM Plex Mono', monospace; font-size: 10px;
          text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint);
        }
        .rail-gate { border-top: 1px solid var(--hairline); padding-top: 14px; margin-top: 4px; }

        .sel {
          font-family: 'IBM Plex Sans', sans-serif; font-size: 12px;
          border: 1px solid var(--hairline); border-radius: 6px;
          padding: 5px 8px; background: var(--canvas); color: var(--ink);
        }

        .tabbar { display: flex; gap: 4px; border-bottom: 1px solid var(--hairline); margin-bottom: 22px; }
        .tabbar__item {
          font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500;
          padding: 10px 14px; border: none; background: transparent; color: var(--ink-faint);
          cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
        }
        .tabbar__item[data-active="true"] { color: var(--ink); border-bottom-color: var(--teal); }

        .panel { display: flex; flex-direction: column; gap: 20px; }
        .poster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
        @media (max-width: 700px) { .poster-grid { grid-template-columns: 1fr; } }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

        .field__label { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
        .field__hint { font-size: 12px; color: var(--ink-faint); margin-bottom: 6px; }
        .ta {
          width: 100%; font-family: 'IBM Plex Sans', sans-serif; font-size: 13.5px;
          border: 1px solid var(--hairline); border-radius: 8px; padding: 9px 11px;
          background: var(--surface); color: var(--ink); resize: vertical; line-height: 1.5;
        }
        .ta:focus { border-color: var(--teal); }

        .subsection { border: 1px solid var(--hairline); border-radius: 12px; padding: 20px; background: var(--surface); }
        .subsection__title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .subsection__hint { font-size: 12.5px; color: var(--ink-faint); margin-bottom: 14px; max-width: 60ch; }

        .whys-chain { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .whys-chain__row { display: flex; align-items: flex-start; gap: 10px; }
        .whys-chain__index {
          font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--brass);
          border: 1px solid var(--brass); border-radius: 50%;
          width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
          flex-shrink: 0; margin-top: 4px;
        }
        .whys-chain__row .ta { flex: 1; }

        .jtbd-row {
          position: relative; border: 1px solid var(--hairline); border-radius: 10px;
          padding: 16px; margin-bottom: 12px; background: var(--canvas);
        }
        .jtbd-row__remove {
          position: absolute; top: 10px; right: 10px; border: none; background: transparent;
          color: var(--ink-faint); cursor: pointer;
        }
        .jtbd-row__remove:hover { color: var(--brick); }
        .jtbd-grid {
          display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
        }
        @media (max-width: 900px) { .jtbd-grid { grid-template-columns: 1fr 1fr; } }

        .phase-block { border: 1px solid var(--hairline); border-radius: 12px; padding: 18px; background: var(--surface); margin-bottom: 4px; }
        .phase-block__head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .phase-block__name { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; }
        .phase-block__pct { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--teal); }

        .task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .task-row {
          display: grid;
          grid-template-columns: 1.6fr 130px 1fr 1fr 24px;
          gap: 8px; align-items: center;
          padding: 8px; border-radius: 8px;
          border: 1px solid var(--hairline); background: var(--canvas);
        }
        .task-row__task, .task-row__note {
          font-family: 'IBM Plex Sans', sans-serif; font-size: 12.5px;
          border: none; background: transparent; color: var(--ink); padding: 4px;
        }
        .task-row__status {
          font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500;
          border: 1px solid var(--hairline); border-radius: 6px; padding: 5px 6px;
        }
        .task-row__link {
          display: flex; align-items: center; gap: 5px; color: var(--ink-faint);
        }
        .task-row__link input {
          border: none; background: transparent; font-size: 12px; width: 100%; color: var(--ink);
        }
        .task-row__remove { border: none; background: transparent; color: var(--ink-faint); cursor: pointer; }
        .task-row__remove:hover { color: var(--brick); }
        .task-row__desc {
          grid-column: 1 / -1; font-size: 11.5px; color: var(--ink-faint);
          padding: 0 4px; font-style: italic;
        }

        .save-indicator {
          position: fixed; bottom: 18px; right: 18px;
          font-family: 'IBM Plex Mono', monospace; font-size: 11px;
          color: var(--ink-faint); background: var(--surface);
          border: 1px solid var(--hairline); padding: 6px 12px; border-radius: 100px;
          transition: opacity .3s ease; pointer-events: none;
        }
      `}</style>

      {!openProject ? (
        <Dashboard
          projects={projects}
          onOpen={setOpenId}
          onCreate={createProject}
          onDelete={deleteProject}
        />
      ) : (
        <ProjectDetail
          project={openProject}
          onChange={updateProject}
          onBack={() => setOpenId(null)}
        />
      )}

      <div className="save-indicator" style={{ opacity: status ? 1 : 0.55 }}>{status || "Saved"}</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
